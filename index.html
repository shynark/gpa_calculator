<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Scores</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 40px;
        }

        h2 {
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        input[type="number"] {
            width: 60px;
            padding: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            font-size: 16px;
            cursor: pointer;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Please write your final grades for the last academic year you have finished</h2>

    <div class="row">
        <label>Physics</label>
        <input type="number" min="0" max="5" id="physics">
    </div>

    <div class="row">
        <label>Chemistry</label>
        <input type="number" min="0" max="5" id="chemistry">
    </div>

    <div class="row">
        <label>Biology</label>
        <input type="number" min="0" max="5" id="biology">
    </div>

    <div class="row">
        <label>Geography</label>
        <input type="number" min="0" max="5" id="geography">
    </div>

    <div class="row">
        <label>Algebra</label>
        <input type="number" min="0" max="5" id="algebra">
    </div>

    <div class="row">
        <label>Geometry</label>
        <input type="number" min="0" max="5" id="geometry">
    </div>

    <div class="row">
        <label>Computer Science</label>
        <input type="number" min="0" max="5" id="cs">
    </div>

    <button onclick="calculateAverage()">Calculate</button>

    <div id="result"></div>
</div>

<script>
function calculateAverage() {
    const subjects = [
        "physics",
        "chemistry",
        "biology",
        "geography",
        "algebra",
        "geometry",
        "cs"
    ];

    let sum = 0;
    let count = 0;

    subjects.forEach(subject => {
        let value = document.getElementById(subject).value;
        if (value !== "") {
            sum += parseFloat(value);
            count++;
        }
    });

    if (count === 0) {
        document.getElementById("result").innerText = "Please enter at least one score.";
        return;
    }

    let average = sum / count;
    document.getElementById("result").innerText =
        "Average score: " + average.toFixed(2);
}
</script>

</body>
</html>
